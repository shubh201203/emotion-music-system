services:
  - type: web
    name: emotion-music-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: SPOTIFY_CLIENT_ID
        sync: false
      - key: SPOTIFY_CLIENT_SECRET
        sync: false
      - key: MONGO_URI
        sync: false
      - key: PYTHON_VERSION
        value: 3.10.13
    healthCheckPath: /health
